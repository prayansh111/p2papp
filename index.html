<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Cloud P2P</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: system-ui, sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; }
        .box { background: #1e293b; max-width: 400px; margin: 40px auto; padding: 30px; border-radius: 20px; border: 1px solid #334155; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        button { background: #3b82f6; color: white; border: none; padding: 14px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: bold; margin: 10px 0; }
        button:hover { background: #2563eb; }
        input { width: 90%; padding: 12px; margin: 10px 0; text-align: center; font-size: 24px; border-radius: 8px; border: none; background: #334155; color: white; outline: none; }
        #bigCode { font-size: 52px; color: #4ade80; font-weight: 800; letter-spacing: 5px; margin: 20px 0; }
        .hidden { display: none; }
        progress { width: 100%; height: 12px; border-radius: 6px; margin-top: 15px; }
        #status { color: #94a3b8; font-size: 14px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🚀 Cloud P2P Transfer</h2>
        <p id="status">Connecting to Google Cloud...</p>

        <div id="setup">
            <button id="btnCreate">Receive (Generate Code)</button>
            <div id="bigCode" class="hidden">000000</div>
            <p style="margin: 20px 0; color: #64748b;">— OR —</p>
            <input type="text" id="inputCode" maxlength="6" placeholder="Enter Code">
            <button id="btnJoin" style="background:#10b981">Send (Connect & Pair)</button>
        </div>

        <div id="transfer" class="hidden">
            <h3 style="color: #4ade80;">✅ Devices Linked</h3>
            <input type="file" id="fileInput">
            <progress id="progressBar" value="0" max="100"></progress>
            <p id="progressText" style="margin-top: 10px;">Ready for 100GB transfer</p>
        </div>
    </div>

    <script>
        // YOUR CUSTOM CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyDXUO76dZzB0lnhQIdvlQqhqd43gvd6968",
            authDomain: "fast-file-transfer-9ec05.firebaseapp.com",
            projectId: "fast-file-transfer-9ec05",
            storageBucket: "fast-file-transfer-9ec05.firebasestorage.app",
            messagingSenderId: "91596561473",
            appId: "1:91596561473:web:b4c66adb7fc77ebd1a3ac0"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        document.getElementById('status').innerText = "🟢 Cloud Ready";

        const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
        let dataChannel;

        // --- RECEIVER LOGIC (Create Room) ---
        document.getElementById('btnCreate').onclick = async () => {
            const code = Math.floor(100000 + Math.random() * 900000).toString();
            document.getElementById('bigCode').innerText = code;
            document.getElementById('bigCode').classList.remove('hidden');
            document.getElementById('status').innerText = "Waiting for Sender...";
            
            const roomRef = db.collection('rooms').doc(code);
            dataChannel = pc.createDataChannel('fileTransfer');
            setupDataChannel(dataChannel);

            pc.onicecandidate = e => e.candidate && roomRef.collection('callerCandidates').add(e.candidate.toJSON());
            
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            await roomRef.set({ offer });

            roomRef.onSnapshot(async snap => {
                const data = snap.data();
                if (!pc.currentRemoteDescription && data?.answer) {
                    await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
                }
            });

            roomRef.collection('calleeCandidates').onSnapshot(snap => {
                snap.docChanges().forEach(change => {
                    if (change.type === 'added') pc.addIceCandidate(new RTCIceCandidate(change.doc.data()));
                });
            });
        };

        // --- SENDER LOGIC (Join Room) ---
        document.getElementById('btnJoin').onclick = async () => {
            const code = document.getElementById('inputCode').value;
            if (code.length !== 6) return alert("Enter 6 digits");
            
            const roomRef = db.collection('rooms').doc(code);
            const roomSnap = await roomRef.get();
            if (!roomSnap.exists) return alert("Code not found! Check if Receiver generated it.");

            pc.ondatachannel = e => setupDataChannel(e.channel);
            pc.onicecandidate = e => e.candidate && roomRef.collection('calleeCandidates').add(e.candidate.toJSON());

            const data = roomSnap.data();
            await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            await roomRef.update({ answer });

            roomRef.collection('callerCandidates').onSnapshot(snap => {
                snap.docChanges().forEach(change => {
                    if (change.type === 'added') pc.addIceCandidate(new RTCIceCandidate(change.doc.data()));
                });
            });
        };

        // --- FILE TRANSFER LOGIC ---
        function setupDataChannel(channel) {
            channel.binaryType = 'arraybuffer';
            channel.onopen = () => {
                document.getElementById('setup').classList.add('hidden');
                document.getElementById('transfer').classList.remove('hidden');
                document.getElementById('status').innerText = "⚡ P2P Direct Link Active";
            };

            let receivedBuffers = [], receivedSize = 0, fileMeta = {};
            channel.onmessage = (e) => {
                if (typeof e.data === 'string') {
                    fileMeta = JSON.parse(e.data);
                } else {
                    receivedBuffers.push(e.data);
                    receivedSize += e.data.byteLength;
                    const p = ((receivedSize / fileMeta.size) * 100).toFixed(1);
                    document.getElementById('progressBar').value = p;
                    document.getElementById('progressText').innerText = `Downloading: ${p}%`;
                    if (receivedSize === fileMeta.size) {
                        const blob = new Blob(receivedBuffers);
                        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = fileMeta.name; a.click();
                        document.getElementById('progressText').innerText = "✅ File Saved!";
                        receivedBuffers = []; receivedSize = 0;
                    }
                }
            };
        }

        document.getElementById('fileInput').onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            dataChannel.send(JSON.stringify({ name: file.name, size: file.size }));
            const chunk = 64 * 1024, reader = new FileReader();
            let offset = 0;
            reader.onload = (ev) => {
                dataChannel.send(ev.target.result);
                offset += ev.target.result.byteLength;
                const p = ((offset / file.size) * 100).toFixed(1);
                document.getElementById('progressBar').value = p;
                document.getElementById('progressText').innerText = `Sending: ${p}%`;
                if (offset < file.size) read();
                else document.getElementById('progressText').innerText = "✅ Transfer Complete!";
            };
            const read = () => reader.readAsArrayBuffer(file.slice(offset, offset + chunk));
            read();
        };
    </script>
</body>
</html>
